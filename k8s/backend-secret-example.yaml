# EXAMPLE ONLY — this file documents the SHAPE of the backend Secret. It is safe
# to commit because it contains no real credential (the value is an obvious
# placeholder). NEVER commit the real password.
#
# How the real Secret is created in production (nothing sensitive in git):
#   - Preferred: AWS Secrets Manager + the Secrets Store CSI driver (or the
#     External Secrets Operator), with the pod's ServiceAccount granted access
#     via IRSA. The Secret object is then projected into the cluster at runtime.
#   - Or, for a quick manual test:
#       kubectl create secret generic backend-secret \
#         --from-literal=DB_PASSWORD='<real-password>'
#
# The backend Deployment mounts this via `envFrom.secretRef`, so DB_PASSWORD
# becomes an environment variable the app reads (see backend/src/db.js).
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  labels:
    app: backend
type: Opaque
stringData:
  DB_PASSWORD: "CHANGE_ME_example_only_do_not_use_in_real_environments"
