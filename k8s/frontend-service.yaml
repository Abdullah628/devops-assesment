# Frontend Service. ClusterIP is enough because external traffic arrives via the
# Ingress (ingress.yaml), which routes to this Service. Exposes port 80 -> 8080.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
